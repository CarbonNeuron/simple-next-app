stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    collection_interval: 5s
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
        remote_timeout: 5s
  processor:
    service_graphs:
      dimensions:
        - http.method
        - http.target
    span_metrics:
      dimensions:
        - http.method
        - http.target
        - http.status_code

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
